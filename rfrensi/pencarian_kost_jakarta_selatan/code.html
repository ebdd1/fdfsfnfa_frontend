<!-- Map Pan Script (Cosmetic enhancement for preview) -->
<script>
        // Simple script to allow subtle dragging of the map background for a better prototype feel
        const mapBg = document.querySelector('.map-bg');
        let isDown = false;
        let startX;
        let startY;
        let bgPosX = 0;
        let bgPosY = 0;

        mapBg.addEventListener('mousedown', (e) => {
            isDown = true;
            startX = e.pageX - mapBg.offsetLeft;
            startY = e.pageY - mapBg.offsetTop;
            mapBg.style.cursor = 'grabbing';
        });
        mapBg.addEventListener('mouseleave', () => {
            isDown = false;
            mapBg.style.cursor = 'grab';
        });
        mapBg.addEventListener('mouseup', () => {
            isDown = false;
            mapBg.style.cursor = 'grab';
        });
        mapBg.addEventListener('mousemove', (e) => {
            if (!isDown) return;
            e.preventDefault();
            const x = e.pageX - mapBg.offsetLeft;
            const y = e.pageY - mapBg.offsetTop;
            const walkX = (x - startX) * 1; 
            const walkY = (y - startY) * 1;
            
            bgPosX += walkX;
            bgPosY += walkY;
            
            mapBg.style.backgroundPosition = `${bgPosX}px ${bgPosY}px, ${bgPosX + 20}px ${bgPosY + 20}px`;
            
            startX = x;
            startY = y;
        });

        // Touch support
        mapBg.addEventListener('touchstart', (e) => {
            isDown = true;
            startX = e.touches[0].pageX - mapBg.offsetLeft;
            startY = e.touches[0].pageY - mapBg.offsetTop;
        });
        mapBg.addEventListener('touchend', () => {
            isDown = false;
        });
        mapBg.addEventListener('touchmove', (e) => {
            if (!isDown) return;
            const x = e.touches[0].pageX - mapBg.offsetLeft;
            const y = e.touches[0].pageY - mapBg.offsetTop;
            const walkX = (x - startX) * 1;
            const walkY = (y - startY) * 1;
            
            bgPosX += walkX;
            bgPosY += walkY;
            
            mapBg.style.backgroundPosition = `${bgPosX}px ${bgPosY}px, ${bgPosX + 20}px ${bgPosY + 20}px`;
            
            startX = x;
            startY = y;
        });
    </script>
